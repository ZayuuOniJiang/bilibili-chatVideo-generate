
server.port=8081
server.servlet.context-path=/


spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp


spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1


logging.level.org.example=INFO
logging.level.org.springframework.web=INFO

# FFmpeg 瑙嗛閲嶇紪鐮佸弬鏁帮紙鐢ㄤ簬绔栧睆杞崲/绔嬬粯鍙犲姞/瀛楀箷鐑у綍锛?
# 榛樿浼樺厛鍏奸【绋冲畾涓庨€熷害锛屽彲鎸夋満鍣ㄦ€ц兘缁х画璋冧紭銆?
ffmpeg.video.codec=libx264
ffmpeg.video.preset=faster
ffmpeg.video.crf=23
ffmpeg.video.threads=0

# DashScope/TTS HTTP 瓒呮椂锛堟绉掞級
dashscope.http.connect-timeout-ms=5000
dashscope.http.read-timeout-ms=120000

# TTS 闊抽涓嬭浇 HTTP 瓒呮椂锛堟绉掞級
download.http.connect-timeout-ms=5000
download.http.read-timeout-ms=120000
download.http.write-timeout-ms=30000
download.http.call-timeout-ms=180000

# 杩愯鏃朵骇鐗╃洰褰曪紙鏀惧湪 classpath 澶栵紝閬垮厤 DevTools 鍥犺祫婧愬彉鏇磋嚜鍔ㄩ噸鍚級
app.storage.base-dir=runtime-data
app.storage.contents-dir=${app.storage.base-dir}/contents
app.storage.sounds-dir=${app.storage.base-dir}/sounds
app.storage.qa-file=${app.storage.base-dir}/QA.txt
app.storage.qa-legacy-file=src/main/resources/QA.txt
app.storage.style-dir=${app.storage.base-dir}/style

# 鎵归噺鍒涘缓绾跨▼姹犲弬鏁?
